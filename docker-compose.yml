name: scalable-messaging-app

services:
  # ==============================================================
  # NGINX LOAD BALANCER (Phase 2)
  # ==============================================================
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      # Expose Nginx on port 80 to intercept all frontend traffic
      - "80:80"
    depends_on:
      - api_1
      - api_2
      - api_3

  # ==============================================================
  # BACKEND CLUSTER - 3 INDEPENDENT NODES (Phase 2)
  # ==============================================================
  api_1:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - NODE_ID=node-1
      - PORT=4000
    # Notice we DO NOT map ports here (e.g. 4000:4000). 
    # Nginx will communicate with this node entirely internally.

  api_2:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - NODE_ID=node-2
      - PORT=4000

  api_3:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - NODE_ID=node-3
      - PORT=4000

  # ==============================================================
  # REDIS MESSAGE BROKER (Phase 3 Preparation)
  # ==============================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  redis_data:
