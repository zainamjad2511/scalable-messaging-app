events {
    # Allows a high number of simultaneous connections per worker
    worker_connections 1024;
}

http {
    # -------------------------------------------------------------
    # 1. UPSTREAM LOAD BALANCER & PASSIVE HEALTH CHECKS
    # -------------------------------------------------------------
    upstream api_cluster {
        # Passive Health Checks (Fault Tolerance):
        # If an API node fails to respond 3 times (max_fails) within 30 seconds (fail_timeout),
        # Nginx temporarily detects it's dead and removes it from the routing pool.
        server api_1:4000 max_fails=2 fail_timeout=5s;
        server api_2:4000 max_fails=2 fail_timeout=5s;
        server api_3:4000 max_fails=2 fail_timeout=5s;
    }

    server {
        # Nginx intercepts the frontend network traffic on port 80
        listen 80;

        # Basic Nginx health endpoint
        location = /nginx/health {
            return 200 "nginx load balancer is active\n";
            add_header Content-Type text/plain;
        }

        # -------------------------------------------------------------
        # 2. WEBSOCKET PROXY CONFIGURATION
        # -------------------------------------------------------------
        location / {
            # Route traffic evenly across the node.js cluster
            proxy_pass http://api_cluster;
            proxy_http_version 1.1;

            # Core WebSocket Upgrade Headers!
            # Without these, Nginx rejects the WS handshake and real-time chat drops.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            # Pass the original user IP forward so the API knows who is connecting
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Extended Timeouts (Scalability/Efficiency): 
            # WebSockets can sit idle while users read. If we don't extend this, 
            # Nginx forcefully disconnects "quiet" users after strict 60 seconds.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Failover Tuning (Instant routing on crash):
            # If a node is dead, limit the connection attempt to 2 seconds instead of hanging for 60 seconds.
            proxy_connect_timeout 2s;
            # Instantly try the next node if the current one throws an error or times out
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }
    }
}
